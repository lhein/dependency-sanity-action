name: 'Dependency Sanity Analyzer'
description: 'Analyze Maven & Gradle dependencies of build file(s) and post a health report as PR comment.'
author: 'lhein'
branding:
  icon: 'shield'
  color: 'green'

inputs:
  build-files:
    description: |
      Build file(s) to analyze. The default value `auto` discovers files
      automatically: in diff mode, the build files changed by this PR;
      in full mode, every pom.xml / build.gradle / build.gradle.kts in
      the repo (excluding target/, build/, .git/, and node_modules/).
      To override, pass a comma-separated list where each entry may be
      a glob (e.g. "pom.xml" or "modules/*/build.gradle" or
      "pom.xml,gradle-app/build.gradle.kts").
    required: false
    default: 'auto'
  pom-path:
    description: |
      Deprecated alias of `build-files`. Still honored for backwards
      compatibility — if set to anything other than the default, it
      overrides `build-files`. Prefer `build-files` for new workflows.
    required: false
    default: 'auto'
  mode:
    description: 'Report mode: diff (PR-only changes) or full (entire tree).'
    required: false
    default: 'diff'
  fail-on:
    description: 'Fail the build when this condition is met: none, critical, warning, cve.'
    required: false
    default: 'none'
  include-transitive-test:
    description: 'Follow transitive test-scope deps (much larger tree). Default false.'
    required: false
    default: 'false'
  comment-mode:
    description: 'PR comment behaviour: update (re-use the bot comment) or new (always add).'
    required: false
    default: 'update'
  cli-version:
    description: 'Version tag of camel-sanity-cli to download. Default latest published release.'
    required: false
    default: 'latest'
  github-token:
    description: 'Token used to post the PR comment. Defaults to GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}

outputs:
  report:
    description: 'Path to the aggregated markdown report file.'
    value: ${{ steps.aggregate.outputs.report }}

runs:
  using: 'composite'
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Download camel-sanity-cli
      shell: bash
      env:
        VERSION: ${{ inputs.cli-version }}
      run: |
        set -euo pipefail
        if [ "$VERSION" = "latest" ]; then
          URL="https://github.com/lhein/camel-sanity-analyzer/releases/latest/download/camel-sanity-cli.jar"
        else
          URL="https://github.com/lhein/camel-sanity-analyzer/releases/download/${VERSION}/camel-sanity-cli.jar"
        fi
        echo "Downloading CLI from $URL"
        curl -fL -o /tmp/camel-sanity-cli.jar "$URL"

    - name: Expand build-file paths
      id: poms
      shell: bash
      env:
        BUILD_FILES: ${{ inputs.build-files }}
        POM_PATH: ${{ inputs.pom-path }}
        MODE: ${{ inputs.mode }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: |
        set -euo pipefail
        shopt -s globstar nullglob

        # Backwards-compatibility: honor the deprecated `pom-path` input if the
        # user set it to anything other than the default. Otherwise prefer the
        # new `build-files` input.
        if [ -n "${POM_PATH:-}" ] && [ "$POM_PATH" != "auto" ]; then
          echo "::warning::input 'pom-path' is deprecated; please migrate to 'build-files'."
          PATTERNS="$POM_PATH"
        else
          PATTERNS="$BUILD_FILES"
        fi

        declare -A seen
        ordered=()
        has_gradle=false

        if [ -z "$PATTERNS" ] || [ "$PATTERNS" = "auto" ]; then
          # Auto-detect mode.
          if [ "$MODE" = "diff" ] && [ -n "${BASE_SHA:-}" ]; then
            # Only build files touched by this PR.
            echo "Auto-detect: build files changed in this PR (pom.xml / build.gradle / build.gradle.kts)"
            while IFS= read -r f; do
              [ -n "$f" ] && [ -f "$f" ] || continue
              if [ -z "${seen[$f]:-}" ]; then
                seen[$f]=1; ordered+=("$f")
              fi
            done < <(git diff --name-only "${BASE_SHA}" HEAD -- \
                       '*pom.xml' '*build.gradle' '*build.gradle.kts' || true)
          else
            # Full-mode (or no base SHA available): scan the working tree.
            echo "Auto-detect: every build file in the working tree"
            while IFS= read -r f; do
              [ -n "$f" ] && [ -f "$f" ] || continue
              f="${f#./}"
              if [ -z "${seen[$f]:-}" ]; then
                seen[$f]=1; ordered+=("$f")
              fi
            done < <(find . \( -name pom.xml -o -name build.gradle -o -name build.gradle.kts \) \
                -not -path '*/.git/*' \
                -not -path '*/target/*' \
                -not -path '*/node_modules/*' \
                -not -path '*/build/*' | sort)
          fi
        else
          # Explicit user-supplied list / globs.
          IFS=',' read -ra parts <<<"$PATTERNS"
          for raw in "${parts[@]}"; do
            p="${raw#"${raw%%[![:space:]]*}"}"; p="${p%"${p##*[![:space:]]}"}"
            [ -z "$p" ] && continue
            for f in $p; do
              if [ -f "$f" ] && [ -z "${seen[$f]:-}" ]; then
                seen[$f]=1; ordered+=("$f")
              fi
            done
          done
        fi

        # Spot whether any Gradle build file made the list — used downstream
        # to decide whether to provision a base-state worktree for diffing.
        for f in "${ordered[@]:-}"; do
          case "$(basename -- "$f")" in
            build.gradle|build.gradle.kts) has_gradle=true ;;
          esac
        done

        if [ "${#ordered[@]}" = "0" ]; then
          # In auto-detect diff mode, "no build files changed" is a normal
          # condition — skip the rest of the workflow gracefully.
          if { [ -z "$PATTERNS" ] || [ "$PATTERNS" = "auto" ]; } && [ "$MODE" = "diff" ]; then
            echo "No build files changed in this PR — skipping analysis."
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::error::No build files matched: ${PATTERNS:-<auto>}"
          exit 1
        fi
        printf '%s\n' "${ordered[@]}" > /tmp/poms.txt
        echo "Matched ${#ordered[@]} build file(s):"
        cat /tmp/poms.txt
        echo "count=${#ordered[@]}" >> "$GITHUB_OUTPUT"
        echo "has-gradle=${has_gradle}" >> "$GITHUB_OUTPUT"

    - name: Run analyzer per build file
      id: analyze
      if: steps.poms.outputs.count != '0'
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        FAIL_ON: ${{ inputs.fail-on }}
        INCLUDE_TEST: ${{ inputs.include-transitive-test }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        HAS_GRADLE: ${{ steps.poms.outputs.has-gradle }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        WORST_EXIT=0
        REPORTS_DIR=$(mktemp -d)
        echo "$REPORTS_DIR" > /tmp/reports-dir

        # Gradle projects need a full base-state checkout to diff against
        # (build.gradle alone isn't enough — settings.gradle, libs.versions.toml
        # and sub-project layouts all participate in resolution). When any
        # Gradle file is in the analysis set AND we are in diff mode, set up
        # a detached worktree at the base SHA and tear it down on exit.
        BASE_WORKTREE=""
        if [ "$MODE" = "diff" ] && [ -n "${BASE_SHA:-}" ] && [ "$HAS_GRADLE" = "true" ]; then
          BASE_WORKTREE=$(mktemp -d -t dsa-base-XXXXXX)
          # mktemp creates the dir; git worktree refuses to use an existing one.
          rm -rf "$BASE_WORKTREE"
          if git worktree add --detach "$BASE_WORKTREE" "$BASE_SHA" 2>/dev/null; then
            echo "Base-state worktree for Gradle diff: $BASE_WORKTREE"
            trap 'git worktree remove --force "$BASE_WORKTREE" >/dev/null 2>&1 || true' EXIT
          else
            echo "::warning::Could not create base worktree at $BASE_SHA — Gradle files will run in full mode."
            BASE_WORKTREE=""
          fi
        fi

        while IFS= read -r pom; do
          [ -z "$pom" ] && continue
          report="$REPORTS_DIR/$(echo "$pom" | tr '/.' '__').md"
          ARGS=("$pom" --output markdown --fail-on "$FAIL_ON" --output-file "$report")
          base_kind="$(basename -- "$pom")"
          if [ "$MODE" = "diff" ] && [ -n "${BASE_SHA:-}" ]; then
            case "$base_kind" in
              build.gradle|build.gradle.kts)
                # Gradle: locate the matching base file inside the worktree.
                if [ -n "$BASE_WORKTREE" ] && [ -f "$BASE_WORKTREE/$pom" ]; then
                  ARGS+=(--base "$BASE_WORKTREE/$pom" --mode diff)
                else
                  echo "::warning::$pom not present on base (or worktree missing) — running full scan"
                  ARGS+=(--mode full)
                fi
                ;;
              *)
                # Maven: cheaper to grab the single file via git show.
                base_tmp=$(mktemp --suffix=.xml)
                if git show "${BASE_SHA}:${pom}" > "$base_tmp" 2>/dev/null; then
                  ARGS+=(--base "$base_tmp" --mode diff)
                else
                  echo "::warning::$pom not present on base — running full scan"
                  ARGS+=(--mode full)
                fi
                ;;
            esac
          else
            ARGS+=(--mode full)
          fi
          if [ "$INCLUDE_TEST" = "true" ]; then
            ARGS+=(--include-transitive-test)
          fi
          echo "::group::analyze $pom"
          set +e
          java -jar /tmp/camel-sanity-cli.jar "${ARGS[@]}"
          rc=$?
          set -e
          [ $rc -gt $WORST_EXIT ] && WORST_EXIT=$rc
          echo "::endgroup::"
          echo "$pom" > "${report}.path"
        done < /tmp/poms.txt
        echo "exit=$WORST_EXIT" >> "$GITHUB_OUTPUT"

    - name: Aggregate reports
      id: aggregate
      if: steps.poms.outputs.count != '0'
      shell: bash
      env:
        COUNT: ${{ steps.poms.outputs.count }}
      run: |
        set -euo pipefail
        REPORTS_DIR=$(cat /tmp/reports-dir)
        AGG=$(mktemp --suffix=.md)
        if [ "$COUNT" -gt 1 ]; then
          echo "## Dependency Sanity Analyzer — $COUNT build files analyzed" > "$AGG"
          echo "" >> "$AGG"
        fi
        first=true
        for path_file in "$REPORTS_DIR"/*.md.path; do
          [ -f "$path_file" ] || continue
          pom_path=$(cat "$path_file")
          report_file="${path_file%.path}"
          if [ "$COUNT" -gt 1 ]; then
            if [ "$first" != "true" ]; then echo "" >> "$AGG"; echo "---" >> "$AGG"; echo "" >> "$AGG"; fi
            echo "## \`$pom_path\`" >> "$AGG"
            echo "" >> "$AGG"
            sed 's/^## Dependency Sanity Analyzer.*//' "$report_file" >> "$AGG"
          else
            cat "$report_file" >> "$AGG"
          fi
          first=false
        done
        echo "report=$AGG" >> "$GITHUB_OUTPUT"

    - name: Post PR comment
      if: github.event_name == 'pull_request' && steps.poms.outputs.count != '0'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPORT: ${{ steps.aggregate.outputs.report }}
        MODE: ${{ inputs.comment-mode }}
        PR: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        MARKER="<!-- dependency-sanity-analyzer -->"
        BODY="$MARKER"$'\n'"$(cat "$REPORT")"
        if [ "$MODE" = "update" ]; then
          EXISTING=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
              --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)
          if [ -n "$EXISTING" ]; then
            gh api -X PATCH "repos/${REPO}/issues/comments/${EXISTING}" -f body="$BODY"
            exit 0
          fi
        fi
        gh api "repos/${REPO}/issues/${PR}/comments" -f body="$BODY"

    - name: Enforce fail-on policy
      if: steps.poms.outputs.count != '0'
      shell: bash
      env:
        EXIT: ${{ steps.analyze.outputs.exit }}
      run: |
        if [ "$EXIT" != "0" ]; then
          echo "::error::Analyzer reported issues matching fail-on=${{ inputs.fail-on }}"
          exit "$EXIT"
        fi
