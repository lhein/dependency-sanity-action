name: Self-test

# Verifies the action works against a sample Maven and a sample Gradle project.
on:
  pull_request:
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create a sample Maven project
        run: |
          mkdir -p sample-maven
          cat > sample-maven/pom.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <project xmlns="http://maven.apache.org/POM/4.0.0">
            <modelVersion>4.0.0</modelVersion>
            <groupId>org.apache.camel</groupId>
            <artifactId>camel-direct</artifactId>
            <version>4.20.0</version>
          </project>
          EOF

      - name: Create a sample Gradle project
        run: |
          mkdir -p sample-gradle
          cat > sample-gradle/settings.gradle <<'EOF'
          rootProject.name = 'sample-gradle'
          EOF
          cat > sample-gradle/build.gradle <<'EOF'
          plugins { id 'java-library' }
          group = 'com.example'
          version = '1.0.0-SNAPSHOT'
          repositories { mavenCentral() }
          dependencies {
              implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.2'
              implementation 'org.slf4j:slf4j-api:2.0.13'
          }
          EOF

      - name: Run analyzer (full mode, Maven + Gradle in one comment)
        uses: ./
        with:
          build-files: sample-maven/pom.xml, sample-gradle/build.gradle
          mode: full
          fail-on: none
